<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rift – Admin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&family=Libre+Franklin:wght@700;900&display=swap" rel="stylesheet">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
    <style>
        .admin-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }
        
        .admin-header {
            margin-bottom: 48px;
        }
        
        .admin-title {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
            color: var(--text-primary);
        }
        
        .admin-subtitle {
            font-size: 15px;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }
        
        .admin-card {
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 32px;
            box-shadow: var(--shadow-md);
        }
        
        .admin-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .admin-form-row {
            display: grid;
            grid-template-columns: 1fr 140px;
            gap: 16px;
            align-items: end;
        }
        
        .admin-input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .admin-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .admin-input {
            padding: 12px 16px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 15px;
            font-family: inherit;
            transition: all 0.2s ease;
        }
        
        .admin-input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.1);
        }
        
        .admin-table-wrapper {
            overflow-x: auto;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            background: #ffffff;
        }
        
        .admin-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .admin-table th {
            padding: 16px 20px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-primary);
        }
        
        .admin-table td {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
            font-size: 14px;
        }
        
        .admin-table tr:last-child td {
            border-bottom: none;
        }
        
        .admin-table tr:hover {
            background: var(--bg-primary);
        }
        
        .admin-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: rgba(0, 0, 0, 0.1);
            color: var(--accent-primary);
        }
        
        .admin-message {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            margin-top: 16px;
            display: none;
        }
        
        .admin-message.success {
            background: rgba(0, 0, 0, 0.05);
            color: var(--accent-primary);
            border: 1px solid var(--accent-primary);
        }
        
        .admin-message.error {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        
        .admin-message a {
            color: inherit;
            text-decoration: underline;
        }
        
        .btn-admin-action {
            padding: 8px 16px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }
        
        .btn-admin-action:hover {
            background: var(--accent-primary);
            color: #ffffff;
            border-color: var(--accent-primary);
            box-shadow: var(--shadow-md);
        }
        
        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <!-- Dark Mode Toggle -->
    <button class="dark-mode-toggle" id="darkModeToggle" aria-label="Toggle dark mode">
        <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
    </button>
    <div class="admin-wrapper">
        <header class="header">
            <div class="header-inner">
                <a href="{{ url_for('index') }}" class="logo" style="text-decoration: none; color: inherit;">Rift</a>
                <div class="header-actions">
                    <a href="{{ url_for('index') }}" class="btn-link">Back to app</a>
                </div>
            </div>
        </header>

        <main class="main-content">
            <div class="admin-header">
                <h1 class="admin-title">Admin Console</h1>
                <p class="admin-subtitle">Manage invitations, credits, and track user activity</p>
            </div>

            <div class="admin-card">
                <form id="inviteForm" class="admin-form">
                    <div class="admin-form-row">
                        <div class="admin-input-group">
                            <label for="inviteEmail" class="admin-label">Invite Email</label>
                            <input type="email" id="inviteEmail" name="inviteEmail" class="admin-input" placeholder="guest@example.com" required>
                        </div>
                        <div class="admin-input-group">
                            <label for="inviteCredits" class="admin-label">Credits</label>
                            <input type="number" id="inviteCredits" name="inviteCredits" class="admin-input" min="1" max="50" value="3" required>
                    </div>
                    </div>
                    <button type="submit" class="btn-primary" style="align-self: flex-start; width: auto;">Send Invite</button>
                    <div id="inviteMessage" class="admin-message"></div>
                </form>
            </div>

            <div class="admin-card" style="padding: 0;">
                <div class="admin-table-wrapper">
                <table class="admin-table" id="usersTable">
                    <thead>
                        <tr>
                            <th>Email</th>
                            <th>Spotify</th>
                            <th>SoundCloud</th>
                            <th>Usage</th>
                            <th>Role</th>
                            <th>Updated</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                                <td colspan="7" class="empty-state" id="usersTablePlaceholder">Loading users…</td>
                        </tr>
                    </tbody>
                </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            fetchUsers();

            const inviteForm = document.getElementById('inviteForm');
            inviteForm.addEventListener('submit', async (event) => {
                event.preventDefault();
                const email = document.getElementById('inviteEmail').value.trim();
                const credits = parseInt(document.getElementById('inviteCredits').value, 10) || 3;
                const messageEl = document.getElementById('inviteMessage');

                try {
                    const resp = await fetch('/api/admin/invite', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, credits })
                    });
                    const data = await resp.json();
                    if (!resp.ok) throw new Error(data.error || 'Failed to send invite');
                    messageEl.className = 'admin-message success';
                    if (data.email_sent) {
                        messageEl.innerHTML = `✓ Invitation sent to ${email}. Share link if needed: <a href="${data.invite_link}" target="_blank" rel="noopener noreferrer">${data.invite_link}</a>`;
                    } else {
                        const info = data.message || 'Email not sent. Share this invite link manually:';
                        messageEl.innerHTML = `${info} <a href="${data.invite_link}" target="_blank" rel="noopener noreferrer">${data.invite_link}</a>`;
                    }
                    messageEl.style.display = 'block';
                    inviteForm.reset();
                } catch (error) {
                    messageEl.className = 'admin-message error';
                    messageEl.textContent = `✗ ${error.message}`;
                    messageEl.style.display = 'block';
                }
            });
        });

        async function fetchUsers() {
            try {
                const resp = await fetch('/api/admin/users');
                const data = await resp.json();
                renderUsers(data.users || []);
            } catch (error) {
                console.error('Failed to load users', error);
            }
        }

        function renderUsers(users) {
            const tbody = document.querySelector('#usersTable tbody');
            tbody.innerHTML = '';

            if (!users.length) {
                const row = document.createElement('tr');
                const cell = document.createElement('td');
                cell.colSpan = 7;
                cell.className = 'empty-state';
                cell.textContent = 'No users yet.';
                row.appendChild(cell);
                tbody.appendChild(row);
                return;
            }

            users.forEach(user => {
                const row = document.createElement('tr');

                const emailCell = document.createElement('td');
                emailCell.textContent = user.email;
                row.appendChild(emailCell);

                const spotifyCell = document.createElement('td');
                spotifyCell.textContent = user.spotify_display_name || '—';
                row.appendChild(spotifyCell);

                const soundcloudCell = document.createElement('td');
                soundcloudCell.textContent = user.soundcloud_display_name || '—';
                row.appendChild(soundcloudCell);

                const usageCell = document.createElement('td');
                usageCell.textContent = `${user.usage_count} playlists`;
                row.appendChild(usageCell);

                const roleCell = document.createElement('td');
                if (user.is_admin) {
                    const badge = document.createElement('span');
                    badge.className = 'admin-badge';
                    badge.textContent = 'Admin';
                    roleCell.appendChild(badge);
                } else {
                    roleCell.textContent = 'User';
                }
                row.appendChild(roleCell);

                const updatedCell = document.createElement('td');
                updatedCell.textContent = user.last_updated ? new Date(user.last_updated).toLocaleString() : '—';
                row.appendChild(updatedCell);

                const actionsCell = document.createElement('td');
                const makeAdminBtn = document.createElement('button');
                makeAdminBtn.className = 'btn-admin-action';
                makeAdminBtn.textContent = user.is_admin ? 'Remove admin' : 'Make admin';
                makeAdminBtn.addEventListener('click', () => toggleAdmin(user.id, !user.is_admin));
                actionsCell.appendChild(makeAdminBtn);
                row.appendChild(actionsCell);

                tbody.appendChild(row);
            });
        }


        async function toggleAdmin(userId, isAdmin) {
            try {
                await fetch(`/api/admin/users/${userId}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ is_admin: isAdmin })
                });
                fetchUsers();
            } catch (error) {
                console.error('Failed to update admin flag', error);
            }
        }
        
        // Dark Mode Toggle Functionality
        (function() {
            const darkModeToggle = document.getElementById('darkModeToggle');
            if (!darkModeToggle) return;
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            darkModeToggle.addEventListener('click', () => {
                const currentTheme = document.documentElement.getAttribute('data-theme');
                const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
            });
        })();
    </script>
</body>
</html>
