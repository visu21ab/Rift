<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rift – Sign In</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&family=Libre+Franklin:wght@700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-text">Rift.</span>
                </div>
            </div>
        </header>

        <main class="main-content">
            <div class="form-container">
                <form method="post" class="playlist-form">
                    <h2 class="hero-title" style="font-size: 36px; margin-bottom: 24px;">Sign in to continue</h2>
                    {% if error %}
                    <div class="error-message" style="display: block;">{{ error }}</div>
                    {% endif %}
                    <div class="form-group">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" id="email" name="email" class="form-input" required placeholder="you@example.com">
                    </div>
                    <div class="form-group">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" id="password" name="password" class="form-input" required minlength="8" placeholder="Your password">
                    </div>
                    <input type="hidden" name="next" value="{{ next }}">
                    <button type="submit" class="btn btn-primary btn-large">Sign In</button>
                    <p class="form-hint" style="margin-top: 8px;">Invited users: check your email for a signup link.</p>
                </form>
            </div>
            
            <footer style="margin-top: 48px; padding-top: 24px; text-align: center;">
                <a href="{{ url_for('privacy') }}" style="color: var(--text-muted); text-decoration: none; font-size: 14px;">Privacy Policy</a>
            </footer>
        </main>
    </div>
</body>
</html>
