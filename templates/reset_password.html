<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rift – Reset Password</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&family=Libre+Franklin:wght@700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-text">Rift.</span>
                </div>
            </div>
        </header>

        <main class="main-content">
            <div class="form-container">
                <form method="post" class="playlist-form">
                    <h2 class="hero-title" style="font-size: 32px; margin-bottom: 12px;">Reset Password</h2>
                    {% if email %}
                    <p class="form-hint" style="margin-bottom: 24px;">Reset password for: <strong>{{ email }}</strong></p>
                    {% endif %}
                    {% if error %}
                    <div class="error-message" style="display: block;">{{ error }}</div>
                    {% endif %}
                    <div class="form-group">
                        <label for="password" class="form-label">New Password</label>
                        <input type="password" id="password" name="password" class="form-input" required minlength="8" placeholder="Enter new password">
                    </div>
                    <div class="form-group">
                        <label for="confirm_password" class="form-label">Confirm New Password</label>
                        <input type="password" id="confirm_password" name="confirm_password" class="form-input" required minlength="8" placeholder="Confirm new password">
                    </div>
                    <button type="submit" class="btn btn-primary btn-large">Reset Password</button>
                    <p class="form-hint" style="margin-top: 16px; text-align: center;">
                        <a href="{{ url_for('auth_login') }}" style="color: var(--text-muted); text-decoration: none;">Back to Sign In</a>
                    </p>
                </form>
            </div>
            
            <footer style="margin-top: 48px; padding-top: 24px; text-align: center;">
                <a href="{{ url_for('privacy') }}" style="color: var(--text-muted); text-decoration: none; font-size: 14px;">Privacy Policy</a>
            </footer>
        </main>
    </div>
</body>
</html>
